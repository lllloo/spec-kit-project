openapi: 3.1.0
info:
  title: Member System — Profile API
  version: 1.0.0
  description: |
    登入後個人資料查/改、頭像上傳、密碼變更。
    對應 spec.md FR-006, FR-007, FR-008, FR-011。

servers:
  - url: http://localhost:8000/api/v1
    description: Dev

components:
  securitySchemes:
    sanctumSession:
      type: apiKey
      in: cookie
      name: spec_kit_session
  schemas:
    Profile:
      type: object
      required: [uuid, email, display_name, avatar_url, contact_info]
      properties:
        uuid: { type: string, format: uuid }
        email: { type: string, format: email, readOnly: true }
        display_name: { type: string, nullable: true, maxLength: 64 }
        avatar_url: { type: string, nullable: true, format: uri }
        contact_info: { type: string, nullable: true, maxLength: 255 }
    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

security:
  - sanctumSession: []

paths:
  /profile:
    get:
      summary: 取得個人資料（FR-006, FR-011）
      tags: [profile]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profile' }
        '401':
          description: 未登入 → 前端依此導回登入頁（FR-011）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    patch:
      summary: 編輯個人資料（顯示名稱、聯絡資訊；不含頭像）(FR-006)
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string, maxLength: 64, nullable: true }
                contact_info: { type: string, maxLength: 255, nullable: true }
      responses:
        '200':
          description: 更新後的 profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profile' }
        '422':
          description: 驗證失敗
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /profile/avatar:
    post:
      summary: 上傳頭像（FR-007）
      tags: [profile]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: 'jpg/png/webp, ≤ 2MB'
      responses:
        '200':
          description: 上傳成功，回傳新 avatar_url
          content:
            application/json:
              schema:
                type: object
                required: [avatar_url]
                properties:
                  avatar_url: { type: string, format: uri }
        '422':
          description: 大小或格式不符（FR-007 拒絕並顯示原因）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /profile/password:
    patch:
      summary: 變更密碼（FR-008）
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string }
                new_password:
                  type: string
                  minLength: 8
                  pattern: '^(?=.*[A-Za-z])(?=.*\d).+$'
      responses:
        '200':
          description: 變更成功；其他 session 已失效（FR-008）
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
        '422':
          description: 目前密碼錯誤或新密碼不符強度
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
